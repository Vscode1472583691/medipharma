services:
  - type: web
    name: medipharma
    runtime: python
    runtimeVersion: 3.11
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: medipharma-db
          property: connectionString

databases:
  - name: medipharma-db
    databaseName: medipharma
    user: medipharma_user
    plan: free
    version: 8.0
